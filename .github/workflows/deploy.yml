name: Deploy examen_suficiencias_adk

on:
  push:
    branches:
      - main
      - qa
      - develop

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required vars
        run: |
          test -n "${{ env.PROJECT_ID }}" || (echo "❌ PROJECT_ID vacío" && exit 1)
          test -n "${{ env.REGION }}" || (echo "❌ REGION vacío" && exit 1)

          echo "✅ PROJECT_ID=${{ env.PROJECT_ID }}"
          echo "✅ REGION=${{ env.REGION }}"

      - name: Set Environment Variables
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "ENVIRONMENT=prod"                                         >> $GITHUB_ENV
            echo "SERVICE_NAME=examen-suficiencias-adk-prod"                >> $GITHUB_ENV
            echo "REPOSITORY=examen-suficiencias-adk-prod"                  >> $GITHUB_ENV

          elif [[ "${GITHUB_REF_NAME}" == "qa" ]]; then
            echo "ENVIRONMENT=qa"                                           >> $GITHUB_ENV
            echo "SERVICE_NAME=examen-suficiencias-adk-qa"                  >> $GITHUB_ENV
            echo "REPOSITORY=examen-suficiencias-adk-dev"                   >> $GITHUB_ENV

          else
            echo "ENVIRONMENT=dev"                                          >> $GITHUB_ENV
            echo "SERVICE_NAME=examen-suficiencias-adk-dev"                 >> $GITHUB_ENV
            echo "REPOSITORY=examen-suficiencias-adk-dev"                   >> $GITHUB_ENV
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify gcloud
        run: |
          gcloud --version
          gcloud config list

      - name: Configure Docker
        run: |
          echo "Configurando Docker para:"
          echo "${{ env.REGION }}-docker.pkg.dev"

          gcloud auth configure-docker \
            ${{ env.REGION }}-docker.pkg.dev \
            --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/app:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        env:
          # ----- Google ADK / Gemini -----
          AGENT_MODEL: ${{ vars.AGENT_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_GENAI_USE_VERTEXAI: ${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}
          APP_LOG_LEVEL: INFO

          # ----- Zoho -----
          ZOHO_MCP_URL: ${{ vars.ZOHO_MCP_URL }}
          ZOHO_ORG_ID: ${{ vars.ZOHO_ORG_ID }}
          ZOHO_DEFAULT_DEPARTMENT_ID: ${{ vars.ZOHO_DEFAULT_DEPARTMENT_ID }}
          ZOHO_DESK_API_BASE: ${{ vars.ZOHO_DESK_API_BASE }}

          ZOHO_TOKEN_WEBHOOK_URL: ${{ secrets.ZOHO_TOKEN_WEBHOOK_URL }}
          ZOHO_TOKEN_WEBHOOK_USER: ${{ secrets.ZOHO_TOKEN_WEBHOOK_USER }}
          ZOHO_TOKEN_WEBHOOK_PASS: ${{ secrets.ZOHO_TOKEN_WEBHOOK_PASS }}

          # ----- Oracle -----
          DB_HOST_ORACLE: ${{ vars.DB_HOST_ORACLE }}
          DB_PORT_ORACLE: ${{ vars.DB_PORT_ORACLE }}
          DB_USERNAME_ORACLE: ${{ vars.DB_USERNAME_ORACLE }}
          DB_PASSWORD_ORACLE: ${{ secrets.DB_PASSWORD_ORACLE }}
          DB_SERVICE_NAME_ORACLE: ${{ vars.DB_SERVICE_NAME_ORACLE }}

          DB_POOL_MIN_SIZE: ${{ vars.DB_POOL_MIN_SIZE }}
          DB_POOL_MAX_SIZE: ${{ vars.DB_POOL_MAX_SIZE }}
          DB_QUERY_TIMEOUT_SECONDS: ${{ vars.DB_QUERY_TIMEOUT_SECONDS }}

        run: |
          gcloud run deploy $SERVICE_NAME \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/app:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300 \
            --concurrency 10 \
            --max-instances 10 \
            --min-instances 0 \
            --service-account examen-suficiencias-adk@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="^|^AGENT_MODEL=$AGENT_MODEL|GEMINI_API_KEY=$GEMINI_API_KEY|GOOGLE_GENAI_USE_VERTEXAI=$GOOGLE_GENAI_USE_VERTEXAI|APP_LOG_LEVEL=$APP_LOG_LEVEL|ZOHO_MCP_URL=$ZOHO_MCP_URL|ZOHO_ORG_ID=$ZOHO_ORG_ID|ZOHO_DEFAULT_DEPARTMENT_ID=$ZOHO_DEFAULT_DEPARTMENT_ID|ZOHO_DESK_API_BASE=$ZOHO_DESK_API_BASE|ZOHO_TOKEN_WEBHOOK_URL=$ZOHO_TOKEN_WEBHOOK_URL|ZOHO_TOKEN_WEBHOOK_USER=$ZOHO_TOKEN_WEBHOOK_USER|ZOHO_TOKEN_WEBHOOK_PASS=$ZOHO_TOKEN_WEBHOOK_PASS|DB_HOST_ORACLE=$DB_HOST_ORACLE|DB_PORT_ORACLE=$DB_PORT_ORACLE|DB_USERNAME_ORACLE=$DB_USERNAME_ORACLE|DB_PASSWORD_ORACLE=$DB_PASSWORD_ORACLE|DB_SERVICE_NAME_ORACLE=$DB_SERVICE_NAME_ORACLE|DB_POOL_MIN_SIZE=$DB_POOL_MIN_SIZE|DB_POOL_MAX_SIZE=$DB_POOL_MAX_SIZE|DB_QUERY_TIMEOUT_SECONDS=$DB_QUERY_TIMEOUT_SECONDS"

      - name: Verify Deployment
        run: |
          sleep 15

          URL=$(gcloud run services describe $SERVICE_NAME \
            --region ${{ env.REGION }} \
            --format='value(status.url)')

          echo "Service URL: $URL"

          status=$(curl -s -o /tmp/list.json -w "%{http_code}" "$URL/list-apps")

          echo "HTTP=$status"
          cat /tmp/list.json
          echo

          if [ "$status" != "200" ]; then
            echo "::error::list-apps no respondio 200; deploy incorrecto."
            exit 1
          fi

          if ! grep -q "examen_suficiencias_adk" /tmp/list.json; then
            echo "::error::examen_suficiencias_adk no aparece en /list-apps"
            exit 1
          fi

          echo "✅ Deploy OK — $SERVICE_NAME en $URL"